<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Player</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #player, #shield {
            width: 100%;
            height: 100%;
        }

        #player {
            position: absolute;
            inset: 0;
            background: #000;
        }

        #player iframe {
            pointer-events: none;
        }

        #shield {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: transparent;
            cursor: default;
        }

    </style>
</head>
<body>
<div id="player"></div>
<div id="shield"></div>
<script>
    let player;
    let isReady = false;
    let pendingVideo = null;
    let currentRequestId = 0;
    let pendingVolume = null;
    let pendingMuted = null;
    let lastVolume = null;
    let lastMuted = null;

    function post(type, payload) {
        if (!window.chrome || !window.chrome.webview) {
            return;
        }

        window.chrome.webview.postMessage({
            type,
            requestId: currentRequestId,
            ...(payload || {})
        });
    }

    function flushPendingVideo() {
        if (!isReady || !pendingVideo) {
            return;
        }

        const video = pendingVideo;
        pendingVideo = null;
        loadVideo(video.videoId, video.startSeconds, video.requestId);
    }

    function applyPendingAudioState() {
        if (!isReady || !player) {
            return;
        }

        if (pendingVolume !== null) {
            applyVolume(pendingVolume);
            pendingVolume = null;
        }

        if (pendingMuted !== null) {
            applyMuted(pendingMuted);
            pendingMuted = null;
        }
    }

    function clearYouTubeChrome() {
        try {
            const iframe = document.querySelector("#player iframe");
            if (iframe) {
                iframe.style.pointerEvents = "none";
            }
        } catch {
        }
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
            width: "100%",
            height: "100%",
            playerVars: {
                autoplay: 0,
                controls: 0,
                disablekb: 0,
                fs: 0,
                iv_load_policy: 3,
                cc_load_policy: 0,
                modestbranding: 1,
                playsinline: 1,
                rel: 0,
                origin: window.location.origin
            },
            events: {
                onReady: () => {
                    isReady = true;
                    clearYouTubeChrome();
                    post("ready");
                    applyPendingAudioState();
                    flushPendingVideo();
                    postVolumeIfChanged(true);
                },
                onStateChange: event => {
                    post("state", { state: event.data });
                    if (event.data === YT.PlayerState.ENDED) {
                        player.stopVideo();
                        post("ended");
                    }
                },
                onError: event => post("error", { errorCode: event.data })
            }
        });
    }

    function loadVideo(videoId, startSeconds, requestId) {
        const normalizedRequestId = Number(requestId) || 0;
        currentRequestId = normalizedRequestId;

        if (!isReady || !player) {
            pendingVideo = { videoId, startSeconds: startSeconds || 0, requestId: normalizedRequestId };
            return;
        }

        try {
            player.loadVideoById({
                videoId,
                startSeconds: startSeconds || 0
            });
            clearYouTubeChrome();
            applyPendingAudioState();
            player.playVideo();
        } catch (error) {
            post("diagnostic", { message: `loadVideoById failed: ${error?.message || error}` });
            post("error", { errorCode: 0 });
        }
    }

    function normalizeVolume(volume) {
        return Math.max(0, Math.min(1, Number(volume) || 0));
    }

    function applyVolume(volume) {
        player.setVolume(Math.round(normalizeVolume(volume) * 100));
        postVolumeIfChanged(true);
    }

    function applyMuted(isMuted) {
        if (isMuted) {
            player.mute();
        } else {
            player.unMute();
        }

        postVolumeIfChanged(true);
    }

    function postVolumeIfChanged(force) {
        if (!isReady || !player || typeof player.getVolume !== "function") {
            return;
        }

        const volume = (player.getVolume() || 0) / 100;
        const muted = !!player.isMuted();
        if (!force && Math.abs((lastVolume ?? -1) - volume) < 0.001 && lastMuted === muted) {
            return;
        }

        lastVolume = volume;
        lastMuted = muted;
        post("volume", { volume, muted });
    }

    window.tapPlayer = {
        load: loadVideo,
        play: () => player && player.playVideo(),
        pause: () => player && player.pauseVideo(),
        stop: () => {
            pendingVideo = null;
            currentRequestId = 0;
            if (!player) {
                return;
            }

            player.stopVideo();
        },
        seek: seconds => player && player.seekTo(seconds || 0, true),
        setVolume: volume => {
            if (!player || typeof player.setVolume !== "function") {
                pendingVolume = normalizeVolume(volume);
                return;
            }

            applyVolume(volume);
        },
        mute: () => {
            if (!player) {
                pendingMuted = true;
                return;
            }

            applyMuted(true);
        },
        unMute: () => {
            if (!player) {
                pendingMuted = false;
                return;
            }

            applyMuted(false);
        }
    };

    window.setInterval(() => {
        if (!isReady || !player || typeof player.getCurrentTime !== "function") {
            return;
        }

        const state = player.getPlayerState();
        if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
            post("position", {
                position: player.getCurrentTime() || 0,
                duration: player.getDuration() || 0
            });
        }

        postVolumeIfChanged(false);
        clearYouTubeChrome();
    }, 500);

    window.addEventListener("error", event => {
        post("diagnostic", { message: event.message || "page script error" });
    });

    window.setTimeout(() => {
        if (!isReady) {
            post("diagnostic", { message: "YouTube iframe API was not ready after 10 seconds" });
        }
    }, 10000);

</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
