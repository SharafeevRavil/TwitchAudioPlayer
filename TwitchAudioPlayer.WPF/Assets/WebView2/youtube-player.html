<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Player</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #player {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>
<div id="player"></div>
<script>
    let player;
    let isReady = false;
    let pendingVideo = null;
    let lastVolume = null;
    let lastMuted = null;

    function post(type, payload) {
        if (!window.chrome || !window.chrome.webview) {
            return;
        }

        window.chrome.webview.postMessage({
            type,
            ...(payload || {})
        });
    }

    function flushPendingVideo() {
        if (!isReady || !pendingVideo) {
            return;
        }

        const video = pendingVideo;
        pendingVideo = null;
        loadVideo(video.videoId, video.startSeconds);
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
            width: "100%",
            height: "100%",
            playerVars: {
                autoplay: 0,
                controls: 0,
                disablekb: 0,
                fs: 0,
                iv_load_policy: 3,
                cc_load_policy: 0,
                modestbranding: 1,
                playsinline: 1,
                rel: 0,
                origin: window.location.origin
            },
            events: {
                onReady: () => {
                    isReady = true;
                    post("ready");
                    postVolumeIfChanged(true);
                    flushPendingVideo();
                },
                onStateChange: event => {
                    post("state", { state: event.data });
                    if (event.data === YT.PlayerState.ENDED) {
                        player.stopVideo();
                        post("ended");
                    }
                },
                onError: event => post("error", { errorCode: event.data })
            }
        });
    }

    function loadVideo(videoId, startSeconds) {
        if (!isReady || !player) {
            pendingVideo = { videoId, startSeconds: startSeconds || 0 };
            return;
        }

        player.loadVideoById({
            videoId,
            startSeconds: startSeconds || 0
        });
        player.playVideo();
    }

    function postVolumeIfChanged(force) {
        if (!isReady || !player || typeof player.getVolume !== "function") {
            return;
        }

        const volume = (player.getVolume() || 0) / 100;
        const muted = !!player.isMuted();
        if (!force && Math.abs((lastVolume ?? -1) - volume) < 0.001 && lastMuted === muted) {
            return;
        }

        lastVolume = volume;
        lastMuted = muted;
        post("volume", { volume, muted });
    }

    window.tapPlayer = {
        load: loadVideo,
        play: () => player && player.playVideo(),
        pause: () => player && player.pauseVideo(),
        stop: () => player && player.stopVideo(),
        seek: seconds => player && player.seekTo(seconds || 0, true),
        setVolume: volume => {
            if (!player || typeof player.setVolume !== "function") {
                return;
            }

            const normalizedVolume = Math.max(0, Math.min(1, Number(volume) || 0));
            player.setVolume(Math.round(normalizedVolume * 100));
            postVolumeIfChanged(true);
        },
        mute: () => {
            if (player) {
                player.mute();
                postVolumeIfChanged(true);
            }
        },
        unMute: () => {
            if (player) {
                player.unMute();
                postVolumeIfChanged(true);
            }
        }
    };

    window.setInterval(() => {
        if (!isReady || !player || typeof player.getCurrentTime !== "function") {
            return;
        }

        const state = player.getPlayerState();
        if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
            post("position", {
                position: player.getCurrentTime() || 0,
                duration: player.getDuration() || 0
            });
        }

        postVolumeIfChanged(false);
    }, 500);
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
